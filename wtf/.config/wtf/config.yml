# ─────────────────────────────────────────────────────────────────────────────
# WTF — Terminal Dashboard (TUI Layer of Life OS)
#
# Install:  yay -S wtfutil   OR  go install github.com/wtfutil/wtf@latest
# Run:      wtf
# Config:   ~/personal/dotfiles/wtf/.config/wtf/config.yml
#           (stowed to ~/.config/wtf/ by install-dotfiles.sh)
#
# Keyboard shortcuts:
#   Tab / Shift+Tab   → cycle between panels
#   hjkl / arrows     → navigate within focused panel
#   Enter             → open/action on selected item
#   r                 → force refresh current panel
#   /                 → search (in supported modules)
#   ?                 → help
#   Ctrl+c / q        → quit
#
# Layout (3 columns):
#   LEFT   → Clock · System stats · Git repos (~/personal)
#   CENTER → Tasks (~/personal/notes/tasks.md) · Ollama health
#   RIGHT  → GitHub activity · Weather
# ─────────────────────────────────────────────────────────────────────────────

wtf:
  refreshInterval: 60
  openFileUtil: "nvim"

  colors:
    border:
      focusable: "darkslateblue"
      focused:   "darkorange"
      normal:    "gray"

  grid:
    # 3 columns: 30% | 40% | 30%
    columns: [30, 40, 30]
    # 5 rows
    rows: [5, 5, 5, 5, 6]

modules:

  # ── Clock ──────────────────────────────────────────────────────────────────
  clocks:
    colors:
      rows:
        even: "lightblue"
        odd:  "white"
    enabled: true
    locations:
      Home: "Asia/Kolkata"
      UTC:  "UTC"
    position:
      top:    0
      left:   0
      height: 1
      width:  1
    refreshInterval: 1
    sort: "alphabetical"
    title: " Time"
    type: "clocks"

  # ── System resource usage ──────────────────────────────────────────────────
  system:
    enabled: true
    position:
      top:    1
      left:   0
      height: 2
      width:  1
    refreshInterval: 5
    title: " System"
    type: "system"

  # ── Git: repos you're actively working in ─────────────────────────────────
  gitrepos:
    enabled: true
    position:
      top:    3
      left:   0
      height: 2
      width:  1
    refreshInterval: 60
    repositories:
      - "~/personal/dotfiles"
      - "~/personal/dev-env"
      - "~/personal/claude-code-daily"
    title: " Git Repos"
    type: "gitrepos"

  # ── Tasks — markdown checkbox list ────────────────────────────────────────
  # Edit directly: nvim ~/personal/notes/tasks.md
  # Press Enter on a task to open it in nvim (openFileUtil above)
  # Keyboard: hjkl to navigate, Enter to check/uncheck, e to edit file
  todo:
    checkedIcon: "x"
    colors:
      checked: gray
      highlight:
        fore: "black"
        back: "orange"
    enabled: true
    filePath: "~/personal/notes/tasks.md"
    position:
      top:    0
      left:   1
      height: 3
      width:  1
    refreshInterval: 30
    title: " Tasks"
    type: "todo"

  # ── Ollama health check ───────────────────────────────────────────────────
  # Shows whether local Ollama LLM server is up (port 11434)
  # and Open WebUI (port 3000)
  ollama:
    args:
      - "-s"
      - "http://localhost:11434"
    cmd: "curl"
    enabled: true
    position:
      top:    3
      left:   1
      height: 2
      width:  1
    refreshInterval: 30
    title: " Ollama"
    type: "cmdrun"

  # ── GitHub — open PRs, issues, reviews ────────────────────────────────────
  # Requires: GITHUB_TOKEN env var
  # Add to ~/.zshrc:  export GITHUB_TOKEN="ghp_xxxxxxxxxxxx"
  github:
    apiKey: "${GITHUB_TOKEN}"
    enabled: true
    position:
      top:    0
      left:   2
      height: 3
      width:  1
    refreshInterval: 300
    repositories:
      # Add repos you actively watch/contribute to:
      # - "tghimanshu/dotfiles"
    showStats: true
    title: " GitHub"
    type: "github"
    username: "tghimanshu"

  # ── Weather ───────────────────────────────────────────────────────────────
  # No API key needed — uses wttr.in with IP geolocation
  weather:
    city:            ""
    enabled:         true
    language:        "en"
    position:
      top:    3
      left:   2
      height: 2
      width:  1
    refreshInterval: 1800
    tempUnit:        "C"
    title:           " Weather"
    type:            "weather"
    useEmoji:        true
