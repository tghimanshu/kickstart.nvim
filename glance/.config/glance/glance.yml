# ─────────────────────────────────────────────────────────────────────────────
# Glance — Personal Life Dashboard
#
# Install (Docker):  run ~/personal/dev-env/omarchy/install-glance.sh
# OR manually:
#   docker run -d -p 4000:8080 \
#     -v ~/.config/glance:/app/config \
#     --name glance --restart unless-stopped glanceapp/glance
#
# Config location:  ~/personal/dotfiles/glance/.config/glance/glance.yml
#                   (stowed to ~/.config/glance/ by install-dotfiles.sh)
#
# Docs: https://github.com/glanceapp/glance
# Access: http://localhost:4000
#
# Keyboard navigation:
#   Glance has NO built-in keyboard shortcuts.
#   Install Vimium browser extension for full keyboard control:
#     Firefox: https://addons.mozilla.org/en-US/firefox/addon/vimium-ff/
#     Chrome:  https://chrome.google.com/webstore/detail/vimium/dbepggeogbaibhgnhhndojpepiihcmeb
#
#   With Vimium active on http://localhost:4000:
#     f           → show link hints (press letter to follow link)
#     F           → open link in new tab
#     j/k         → scroll down/up
#     H/L         → back/forward
#     /           → find on page
#     gi          → focus first input
#     ?           → show all Vimium shortcuts
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8080

theme:
  background-color: 240 10 6
  primary-color: 217 92 83
  positive-color: 115 54 76
  negative-color: 0 72 63

pages:
  # ── PAGE 1: Life OS ────────────────────────────────────────────────────────
  - name: Life OS
    columns:
      # ── LEFT COLUMN ────────────────────────────────────────────────────────
      - size: small
        widgets:
          - type: clock
            hour-format: 24h
            timezones:
              - timezone: Asia/Kolkata
                label: IST
              - timezone: UTC
                label: UTC

          - type: monitor
            title: Local Services
            sites:
              - title: Open WebUI (Ollama)
                url: http://localhost:3000
                icon: si:ollama
              - title: Glance Dashboard
                url: http://localhost:4000
                icon: si:statuspage

          - type: bookmarks
            title: Dev Environment
            groups:
              - title: Code
                links:
                  - title: GitHub
                    url: https://github.com
                    icon: si:github
                  - title: GitHub Copilot
                    url: https://github.com/copilot
                    icon: si:githubcopilot
                  - title: Student Pack
                    url: https://education.github.com/pack
                    icon: si:github
              - title: Deploy
                links:
                  - title: Vercel
                    url: https://vercel.com/dashboard
                    icon: si:vercel
                  - title: Railway
                    url: https://railway.app/dashboard
                    icon: si:railway
                  - title: Render
                    url: https://dashboard.render.com
                    icon: si:render

      # ── MIDDLE COLUMN ──────────────────────────────────────────────────────
      - size: full
        widgets:
          - type: bookmarks
            title: AI & LLM
            groups:
              - title: Local
                links:
                  - title: Open WebUI (Ollama)
                    url: http://localhost:3000
                    icon: si:ollama
              - title: Cloud
                links:
                  - title: ChatGPT
                    url: https://chatgpt.com
                    icon: si:openai
                  - title: Gemini
                    url: https://gemini.google.com
                    icon: si:googlegemini
                  - title: Perplexity
                    url: https://www.perplexity.ai
                    icon: si:perplexity
                  - title: Hugging Face
                    url: https://huggingface.co
                    icon: si:huggingface
                  - title: Google Colab
                    url: https://colab.research.google.com
                    icon: si:googlecolab

          - type: bookmarks
            title: Learning
            groups:
              - title: Practice
                links:
                  - title: LeetCode
                    url: https://leetcode.com
                    icon: si:leetcode
                  - title: Exercism
                    url: https://exercism.org/dashboard
                    icon: si:exercism
                  - title: Anki
                    url: https://ankiweb.net
                    icon: si:anki
              - title: Courses
                links:
                  - title: roadmap.sh
                    url: https://roadmap.sh
                    icon: si:roadmapdotsh
                  - title: CS50x
                    url: https://cs50.harvard.edu/x
                    icon: di:harvard
                  - title: MIT OCW
                    url: https://ocw.mit.edu
                    icon: di:mit

      # ── RIGHT COLUMN ───────────────────────────────────────────────────────
      - size: small
        widgets:
          - type: bookmarks
            title: Documentation
            groups:
              - title: Dev
                links:
                  - title: DevDocs
                    url: https://devdocs.io
                    icon: si:devdocs
                  - title: Neovim Docs
                    url: https://neovim.io/doc/user/
                    icon: si:neovim
                  - title: MDN
                    url: https://developer.mozilla.org
                    icon: si:mdnwebdocs
                  - title: Python Docs
                    url: https://docs.python.org/3
                    icon: si:python
                  - title: cppreference
                    url: https://en.cppreference.com
                    icon: si:cplusplus

          - type: bookmarks
            title: Utilities
            groups:
              - title: Tools
                links:
                  - title: Excalidraw
                    url: https://excalidraw.com
                    icon: si:excalidraw
                  - title: RegExr
                    url: https://regexr.com
                    icon: si:regex
                  - title: JSON Crack
                    url: https://jsoncrack.com
                    icon: si:json
                  - title: Crontab Guru
                    url: https://crontab.guru
                    icon: si:linux
                  - title: Explainshell
                    url: https://explainshell.com
                    icon: si:gnubash

  # ── PAGE 2: Notes & Feeds ──────────────────────────────────────────────────
  - name: Notes & Feeds
    columns:
      # ── LEFT ───────────────────────────────────────────────────────────────
      - size: small
        widgets:
          - type: clock
            hour-format: 24h
            timezones:
              - timezone: Asia/Kolkata
                label: IST

          - type: bookmarks
            title: Quick Links
            groups:
              - title: My Stuff
                links:
                  - title: GitHub Profile
                    url: https://github.com/tghimanshu
                    icon: si:github
                  - title: Dotfiles
                    url: https://github.com/tghimanshu/dotfiles
                    icon: si:git
              - title: Social
                links:
                  - title: X / Twitter
                    url: https://x.com
                    icon: si:x
                  - title: YouTube
                    url: https://youtube.com
                    icon: si:youtube

      # ── MIDDLE ─────────────────────────────────────────────────────────────
      - size: full
        widgets:
          - type: hacker-news

          - type: reddit
            subreddit: neovim
            show-thumbnails: false

      # ── RIGHT ──────────────────────────────────────────────────────────────
      - size: small
        widgets:
          - type: monitor
            title: Local Services
            sites:
              - title: Open WebUI
                url: http://localhost:3000
                icon: si:ollama
              - title: Glance
                url: http://localhost:4000
                icon: si:statuspage

          - type: bookmarks
            title: Communities
            groups:
              - title: Reddit
                links:
                  - title: r/vim
                    url: https://reddit.com/r/vim
                    icon: si:reddit
                  - title: r/archlinux
                    url: https://reddit.com/r/archlinux
                    icon: si:archlinux
                  - title: r/Python
                    url: https://reddit.com/r/Python
                    icon: si:python
                  - title: r/selfhosted
                    url: https://reddit.com/r/selfhosted
                    icon: si:reddit
